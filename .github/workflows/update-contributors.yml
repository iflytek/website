name: Update Contributors

on:
  schedule:
    - cron: '0 18 * * 0'  # Every Monday at 2:00 AM Beijing time (UTC+8)
  workflow_dispatch:       # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Update contributors data
        run: npm run fetch:contributors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .cache/contributors.json
          git diff --cached --quiet || git commit -m "chore: update contributors data [skip ci]"
          git push
