site:
  name: 讯飞开源
  site: 'https://opensource.iflytek.com'
  base: '/'
  trailingSlash: false

# Default SEO metadata
metadata:
  title:
    default: 讯飞开源
    template: '%s — 讯飞开源'
  description: 'iFLYTEK Open Source - Exploring AI, NLP, Speech Recognition and more open source projects from iFLYTEK.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: 讯飞开源
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@ifaborat'
    site: '@ifaborat'
    cardType: summary_large_image

i18n:
  language: zh
  textDirection: ltr
  defaultLocale: zh
  locales:
    - code: zh
      name: 中文
    - code: en
      name: English

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/blog/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
